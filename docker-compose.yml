services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: docs
      POSTGRES_PASSWORD: docs
      POSTGRES_DB: docs_organizer
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U docs -d docs_organizer"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    ports:
      - "3000:3000"
    environment:
      PORT: 3000
      NODE_ENV: production
      DATABASE_URL: postgresql://docs:docs@postgres:5432/docs_organizer
      CORS_ORIGIN: http://localhost:5173
      STORAGE_DRIVER: local
      LOCAL_STORAGE_DIR: /app/data/uploads
      OCR_LANG: por+eng
      OCR_TMP_DIR: /app/data/ocr-tmp
    volumes:
      - api-data:/app/data
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  pgdata:
  api-data:
