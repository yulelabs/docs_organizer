# Railway service config — API + OCR worker
# Docs: https://docs.railway.com/reference/config-as-code

[build]
builder = "DOCKERFILE"
dockerfilePath = "apps/api/Dockerfile"
watchPatterns = ["apps/api/**", "packages/shared/**", "package.json", "package-lock.json"]

[deploy]
healthcheckPath = "/api/health"
healthcheckTimeout = 300
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 5

[environments.production.variables]
NODE_ENV = "production"
PORT = "3000"
STORAGE_DRIVER = "local"
OCR_LANG = "por+eng"
LOCAL_STORAGE_DIR = "/app/data/uploads"
OCR_TMP_DIR = "/app/data/ocr-tmp"
