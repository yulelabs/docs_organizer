name: CI

on:
  pull_request:
  push:
    branches: [main, "cursor/**"]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
      - run: npm ci
      - run: npm run build -w @docs-organizer/shared
      - run: npm test
      - run: npm run typecheck
      - run: npm run build -w @docs-organizer/web
      - run: npm run build -w @docs-organizer/api
