name: Deploy Docs Organizer

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      skip_railway:
        description: Skip Railway API deploy
        type: boolean
        default: false
      skip_pages:
        description: Skip Cloudflare Pages deploy
        type: boolean
        default: false

concurrency:
  group: deploy-production
  cancel-in-progress: true

env:
  NODE_VERSION: "22"
  PAGES_PROJECT: docs-organizer

jobs:
  test:
    name: Test & build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build shared types
        run: npm run build -w @docs-organizer/shared

      - name: Unit tests
        run: npm test

      - name: Typecheck
        run: npm run typecheck

      - name: Build web
        run: npm run build -w @docs-organizer/web
        env:
          VITE_API_BASE: ${{ vars.VITE_API_BASE }}

      - name: Upload web artifact
        uses: actions/upload-artifact@v4
        with:
          name: web-dist
          path: apps/web/dist
          retention-days: 7

  railway:
    name: Deploy API to Railway
    needs: test
    if: ${{ !(github.event_name == 'workflow_dispatch' && inputs.skip_railway) }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check Railway auth
        id: auth
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
          RAILWAY_API_TOKEN: ${{ secrets.RAILWAY_API_TOKEN }}
        run: |
          if [ -n "${RAILWAY_TOKEN:-}" ] || [ -n "${RAILWAY_API_TOKEN:-}" ]; then
            echo "ok=true" >> "$GITHUB_OUTPUT"
          else
            echo "ok=false" >> "$GITHUB_OUTPUT"
            echo "::warning::Missing RAILWAY_TOKEN or RAILWAY_API_TOKEN — skip API deploy"
          fi

      - name: Install Railway CLI
        if: steps.auth.outputs.ok == 'true'
        run: npm install -g @railway/cli@5.2.0

      - name: Deploy API image
        if: steps.auth.outputs.ok == 'true'
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
          RAILWAY_API_TOKEN: ${{ secrets.RAILWAY_API_TOKEN }}
          RAILWAY_PROJECT_ID: ${{ vars.RAILWAY_PROJECT_ID }}
          RAILWAY_ENVIRONMENT_ID: ${{ vars.RAILWAY_ENVIRONMENT_ID }}
          RAILWAY_SERVICE_ID: ${{ vars.RAILWAY_SERVICE_ID }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          CORS_ORIGIN: ${{ vars.CORS_ORIGIN }}
        run: |
          set -euo pipefail
          ARGS=(up --ci --detach)
          if [ -n "${RAILWAY_SERVICE_ID:-}" ]; then ARGS+=(--service "$RAILWAY_SERVICE_ID"); fi
          if [ -n "${RAILWAY_ENVIRONMENT_ID:-}" ]; then ARGS+=(--environment "$RAILWAY_ENVIRONMENT_ID"); fi
          if [ -n "${RAILWAY_PROJECT_ID:-}" ]; then ARGS+=(--project "$RAILWAY_PROJECT_ID"); fi
          railway "${ARGS[@]}"

          if [ -n "${DATABASE_URL:-}" ]; then
            railway variables --set "DATABASE_URL=${DATABASE_URL}" --skip-deploys || true
          fi
          if [ -n "${CORS_ORIGIN:-}" ]; then
            railway variables --set "CORS_ORIGIN=${CORS_ORIGIN}" --skip-deploys || true
          fi
          railway variables --set "NODE_ENV=production" --skip-deploys || true
          railway variables --set "PORT=3000" --skip-deploys || true
          railway variables --set "STORAGE_DRIVER=${STORAGE_DRIVER:-local}" --skip-deploys || true
          railway variables --set "OCR_LANG=por+eng" --skip-deploys || true
          railway variables --set "LOCAL_STORAGE_DIR=/app/data/uploads" --skip-deploys || true
          railway variables --set "OCR_TMP_DIR=/app/data/ocr-tmp" --skip-deploys || true

  pages:
    name: Deploy frontend to Cloudflare Pages
    needs: test
    if: ${{ !(github.event_name == 'workflow_dispatch' && inputs.skip_pages) }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Check Cloudflare auth
        id: auth
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          if [ -n "${CLOUDFLARE_API_TOKEN:-}" ] && [ -n "${CLOUDFLARE_ACCOUNT_ID:-}" ]; then
            echo "ok=true" >> "$GITHUB_OUTPUT"
          else
            echo "ok=false" >> "$GITHUB_OUTPUT"
            echo "::warning::Missing CLOUDFLARE_API_TOKEN / CLOUDFLARE_ACCOUNT_ID — skip Pages deploy"
          fi

      - name: Install & build
        if: steps.auth.outputs.ok == 'true'
        run: |
          npm ci
          npm run build -w @docs-organizer/shared
          npm run build -w @docs-organizer/web
        env:
          VITE_API_BASE: ${{ vars.VITE_API_BASE }}

      - name: Ensure Pages project
        if: steps.auth.outputs.ok == 'true'
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: npx wrangler pages project create "$PAGES_PROJECT" --production-branch=main || true

      - name: Deploy Pages
        if: steps.auth.outputs.ok == 'true'
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy apps/web/dist --project-name=docs-organizer --branch=main
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}
